<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./app.js" defer type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Contatos</title>
</head>
<body class=
        "flex flex-col 
        items-center justify-center 
        min-h-screen
        bg-gradient-to-b from-red-300 to-green-200 min-h-screen"
>
    <div class="grid grid-cols-2 gap-4">
        <input 
            type="text"
            placeholder="Nome do contato..."
            class="border rounded px-8 py-2 placeholder-gray-400 bg-gradient-to-r from-blue-200 to-red-200"
            id="nomeInput"
        >

        <input 
            type="text"
            placeholder="Numero do contato..."
            class="border rounded px-8 py-2 placeholder-gray-400 bg-gradient-to-r from-blue-200 to-red-200"
            id="numeroInput"
        >

        <input 
            type="text"
            placeholder="Foto do contato..."
            class="border rounded px-8 py-2 placeholder-gray-400 bg-gradient-to-r from-blue-200 to-red-200"
            id="fotoInput"
        >

        <input 
            type="text"
            placeholder="Cidade do contato..."
            class="border rounded px-8 py-2 placeholder-gray-400 bg-gradient-to-r from-blue-200 to-red-200"
            id="cidadeInput"
        >
    </div>
</body>
</html>
